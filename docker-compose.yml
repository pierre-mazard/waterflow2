version: "3.9"

services:
  db:
    image: postgres:15
    container_name: waterflow-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"


  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: waterflow-api
    environment:
      DB_URL: ${DB_URL}
      OCR_API_KEY: ${OCR_API_KEY}
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models


  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: waterflow-web
    environment:
      DB_URL: ${DB_URL}
    depends_on:
      - api
    ports:
      - "8501:8501"

  prometheus:
    image: prom/prometheus
    container_name: waterflow-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    container_name: waterflow-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  mlflow:
    image: ghcr.io/mlflow/mlflow:2.14.0
    container_name: waterflow-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000


volumes:
  db_data:
  grafana-data:

